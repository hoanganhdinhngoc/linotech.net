<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linotech - Under Maintenance</title>
    
    <link rel="icon" href="cdn/images/icon-dark.png">
    
    <style>
        /* --- CORE VARIABLES & RESET --- */
        :root {
            --text-muted: #94a3b8;
            --bg-base: #050510; /* Kế thừa tone màu tối của template */
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: #ffffff;
            height: 100%;
        }

        /* --- HERO SECTION (Kế thừa phong cách từ Mera AI) --- */
        .hero {
            height: 100vh; 
            min-height: 600px; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 0 20px; 
            box-sizing: border-box;
            background: radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.15), rgba(37, 99, 235, 0.1) 40%, transparent 70%);
            
            /* Chuẩn bị cho hiệu ứng JS Fade-in */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .hero.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3)); /* Nổi bật logo trên nền tối */
        }

        .hero h1 { 
            font-size: 3.5rem; 
            margin: 0 0 20px 0; 
            letter-spacing: -1px; 
            font-weight: 600; 
            line-height: 1.1;
        }

        .hero p { 
            font-size: 1.2rem; 
            color: var(--text-muted); 
            max-width: 1200px; 
            margin: 0 0 40px 0; 
            line-height: 1.6;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1.1rem; }
            .logo { max-width: 220px; margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <main class="hero" id="maintenance-section">
        <img src="cdn/images/logo-dark-theme-reg.png" alt="Linotech Logo" class="logo">
        
        <h1>Under Maintenance</h1>
        <p>The Linotech website is currently undergoing scheduled maintenance. We are working hard to bring you a better experience and will be public in the near future.</p>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const maintenanceSection = document.getElementById('maintenance-section');
            
            // Thêm độ trễ nhỏ 100ms để đảm bảo CSS transition hoạt động trơn tru sau khi load
            setTimeout(() => {
                maintenanceSection.classList.add('loaded');
            }, 100);
        });
    </script>

</body>
</html>
