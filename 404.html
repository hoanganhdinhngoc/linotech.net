<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linotech - Page Not Found</title>

    <link rel="icon" href="cdn/images/icon-dark.png">

    <style>
        /* --- CORE VARIABLES & RESET --- */
        :root {
            --text-muted: #94a3b8;
            --bg-base: #050510;
            /* Kế thừa tone màu tối của template */
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: #ffffff;
            height: 100%;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.15), rgba(37, 99, 235, 0.1) 40%, transparent 70%);

            /* Hiệu ứng JS Fade-in */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .hero.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            /* Nổi bật logo trên nền tối */
        }

        /* --- 404 SPECIFIC STYLES --- */
        .error-code {
            font-size: 15rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -2px;
            line-height: 1;
            /* Đổ màu gradient tiệp với màu nền */
            background: linear-gradient(to right, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero h1 {
            font-size: 2.2rem;
            margin: 0 0 20px 0;
            letter-spacing: -0.5px;
            font-weight: 600;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 0 40px 0;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .error-code {
                font-size: 10rem;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .logo {
                max-width: 100px;
                margin-bottom: 30px;
            }
        }
    </style>
</head>

<body>
    <main class="hero" id="maintenance-section">
        <img src="cdn/images/logo-dark-theme-reg.png" alt="Linotech Logo" class="logo">

        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>

        <a href="/" class="btn">Return to Homepage</a>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const maintenanceSection = document.getElementById('maintenance-section');

            // Thêm độ trễ nhỏ 100ms để đảm bảo CSS transition hoạt động trơn tru sau khi load
            setTimeout(() => {
                maintenanceSection.classList.add('loaded');
            }, 100);
        });
    </script>

        xintegrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ=="
        data-cf-beacon='{"version":"2024.11.0","token":"ff4570adde7b4ea18156bc5f6689c544","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}'
        crossorigin="anonymous"></script>
</body>

</html>
